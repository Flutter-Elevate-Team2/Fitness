name: fitness_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  app_links: ^7.0.0
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  dio_cache_interceptor: ^4.0.5
  equatable: ^2.0.7
  firebase_analytics: ^12.1.1
  firebase_crashlytics: ^5.0.7
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_localization: ^0.3.3
  flutter_native_splash: ^2.4.7
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  get_it: ^9.2.0
  go_router: ^16.3.0
  hive_ce: ^2.5.2
  youtube_player_flutter: ^9.1.3
  mocktail_image_network: ^1.3.0

  # ── Hive Database ───────────────────────────────
  hive_ce_flutter: ^2.1.0
  http: ^1.6.0
  icons_launcher: ^3.1.0
  hive: ^2.2.3
  image_picker: ^1.2.1
  injectable: ^2.5.2
  connectivity_plus: ^7.1.1
  json_annotation: ^4.9.0
  logger: ^2.6.0
  lottie: ^3.3.2
  palette_generator: ^0.3.3+7
  path_provider: ^2.1.4
  pinput: ^5.0.2
  pretty_dio_logger: ^1.4.0
  retrofit: ">=4.8.0 <4.9.0"
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.3.0
  provider: ^6.1.5+1
  firebase_auth_mocks: ^0.15.1
  flutter_facebook_auth: ^7.1.6
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.9
  flutter_gen_runner: ^5.12.0
  flutter_test:
    sdk: flutter
  hive_ce_generator: ^1.10.0
  injectable_generator: ^2.9.1
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  network_image_mock: ^2.1.1
  retrofit_generator: ^10.0.6

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - .env

  fonts:
    - family: BalooThambi2
      fonts:
        - asset: assets/fonts/BalooThambi2-Regular.ttf
          weight: 400
        - asset: assets/fonts/BalooThambi2-Medium.ttf
          weight: 500
        - asset: assets/fonts/BalooThambi2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/BalooThambi2-Bold.ttf
          weight: 700
        - asset: assets/fonts/BalooThambi2-ExtraBold.ttf
          weight: 800

icons_launcher:
  image_path: "assets/images/app_icon.png"
  platforms:
    android:
      enable: true
      adaptive_background_color: "#FFFFFF"
      adaptive_foreground_image: "assets/images/app_icon.png"
    ios:
      enable: true

dependency_overrides:
  # Forces dart_style to 3.x, which is what retrofit_generator 10.x requires.
  # This resolves any accidental dart_style version drift from other generators.
  dart_style: ^3.1.1