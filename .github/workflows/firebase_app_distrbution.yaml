name: Flutter CI/CD

on:
  push:
    branches:
      - main
      - development
      - release/demo

  pull_request:
    branches:
      - main
      - development

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout My Code
        uses: actions/checkout@v4

      # 1️⃣ Create .env file from secrets (before pub get)
      - name: Create .env file from secrets
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # 2️⃣ Setup Java (required for Android build)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Install Flutter (stable channel)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # 4️⃣ Install dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 5️⃣ Generate code (JSON Serializable, Retrofit, Mockito)
      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      # 6️⃣ Create google-services.json from secrets
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # 7️⃣ Run tests
      - name: Run Tests
        run: flutter test --coverage

      # 8️⃣ Build APK release
      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      # 9️⃣ List APK output (optional, for debug)
      - name: List APK
        run: ls build/app/outputs/flutter-apk

      # 🔟 Upload APK to Firebase App Distribution
      - name: Upload artifact to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{secrets.APP_ID}}
          serviceCredentialsFileContent: ${{secrets.GOOGLE_APPLICATION_CREDENTIALS}}
          groups: Testers
          file: build/app/outputs/flutter-apk/app-release.apk
