name: Validate Branch Name

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Check branch name
        uses: actions/github-script@v7
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref;

            const branchRegex = /^(feature|bugfix|hotfix|release)\/[A-Z0-9]+-\d+-[A-Za-z0-9]+(?:[-][A-Za-z0-9]+)*$/;

            if (!branchRegex.test(branchName)) {
              core.setFailed(
                `❌ Invalid branch name: "${branchName}"\n` +
                `Expected format:\n` +
                `branch-type/TICKET-ID-task-name\n\n` +
                `Allowed prefixes: feature, bugfix, hotfix, release\n` +
                `Ticket format: TEAM2-17\n\n` +
                `Example:\n`  +
                `feature/TEAM2-17-validate-branch-name-action`
              );
            } else {
              console.log(`✅ Branch name format is valid: "${branchName}"`);
            } 
